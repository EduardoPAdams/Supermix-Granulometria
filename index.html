<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Granulometria">
<meta name="theme-color" content="#c1272d">
<title>Granulometria — Supermix</title>
<style>
/* ── APP ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#f0f0f0;font-family:'Segoe UI',system-ui,sans-serif;color:#222;font-size:14px}
input[type=date]{color-scheme:light}
.wrap{max-width:960px;margin:0 auto;padding-bottom:40px}
.hdr{background:#6d6e71}
.hdr-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
.logo-box{display:flex;flex-direction:column;gap:2px}
.logo-row{display:flex;align-items:center}
.logo-txt{color:#fff;font-size:20px;font-weight:800;letter-spacing:1.5px;padding:3px 8px 3px 2px}
.logo-diamond{width:20px;height:20px;background:#c1272d;transform:rotate(45deg);flex-shrink:0}
.logo-tag{color:#c1272d;font-size:9px;letter-spacing:.3px;padding-left:2px}
.hdr-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px 16px 12px}
.hdr-lbl{color:rgba(255,255,255,.6);font-size:10px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.hdr-inp{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:6px 10px;font-size:13px;width:100%;font-family:inherit}
.hdr-inp::placeholder{color:rgba(255,255,255,.4)}
.nav{display:flex;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:20}
.nav-btn{flex:1;padding:11px 4px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;transition:.15s;font-family:inherit}
.nav-btn.on{color:#c1272d;border-bottom-color:#c1272d;font-weight:500;background:#fff9f9}
.mat-tabs{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mat-tabs::-webkit-scrollbar{display:none}
.mat-tab{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;border:1px solid #ddd;background:#fff;color:#666;font-family:inherit;flex-shrink:0}
.mat-tab.on{background:#c1272d;color:#fff;border-color:#c1272d;font-weight:500}
.mat-tab.done{border-color:#5dcaa5;color:#0a5c44}
.pad{padding:12px 16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.card.alt{background:#f7f7f7}
.sec-ttl{display:flex;align-items:center;gap:7px;font-weight:500;font-size:13px;margin-bottom:10px;color:#222}
.sec-ttl::before{content:'';display:block;width:3px;height:15px;background:#c1272d;border-radius:2px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.flbl{font-size:10px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.inp{width:100%;padding:7px 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;background:#fff;color:#222;font-family:inherit}
.inp:focus{outline:none;border-color:#c1272d;box-shadow:0 0 0 2px rgba(193,39,45,.15)}
.inp-r{text-align:right}
.inp-sm{padding:4px 6px;font-size:12px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{padding:6px 6px;font-weight:500;font-size:11px;color:#555;background:#f5f5f5;border-bottom:1px solid #e0e0e0;white-space:nowrap}
th.l{text-align:left}th.r{text-align:right}
td{padding:5px 6px;font-size:12px;border-bottom:1px solid #eee;color:#222}
td.r{text-align:right}td.l{text-align:left}
tr.e{background:#fff}tr.o{background:#fafafa}tr.tot{background:#f5f5f5;font-weight:500}
.mf-ok{display:inline-flex;align-items:center;gap:6px;background:#e1f5ee;border:1px solid #5dcaa5;border-radius:5px;padding:4px 10px;font-size:12px;color:#0a5c44;margin-top:8px}
.mf-warn{display:inline-flex;align-items:center;gap:6px;background:#fff3e0;border:1px solid #ffb74d;border-radius:5px;padding:4px 10px;font-size:12px;color:#e65100;margin-top:8px}
.save-bar{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:4px}
.saved{font-size:12px;color:#0a5c44}
.btn-save{background:#c1272d;color:#fff;border:none;border-radius:7px;padding:11px 24px;cursor:pointer;font-weight:500;font-size:14px;font-family:inherit}
.btn-save:active{transform:scale(.97)}

/* ── RELATÓRIO — Estilo folha impressa ───── */
.report-toolbar{display:flex;justify-content:flex-end;padding:12px 16px 8px}
.btn-print{background:#fff;border:1px solid #c1272d;color:#c1272d;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}

.rp-wrap{padding:0 12px 16px;overflow-x:auto}

.rp-page{
  background:#fff;
  border:1px solid #ccc;
  border-radius:6px;
  padding:14px 14px 10px;
  font-family:Arial,Helvetica,sans-serif;
  font-size:9.5px;
  color:#000;
  min-width:700px;
}

/* cabeçalho do relatório */
.rp-hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #000;padding-bottom:6px;margin-bottom:6px}
.rp-logo-row{display:flex;align-items:center;gap:4px}
.rp-logo-txt{font-size:15px;font-weight:900;letter-spacing:1px;color:#555}
.rp-logo-diamond{width:14px;height:14px;background:#c1272d;transform:rotate(45deg);flex-shrink:0;margin-left:3px}
.rp-logo-tag{font-size:7px;color:#c1272d;margin-top:1px}
.rp-title{font-size:14px;font-weight:700;letter-spacing:2px}
.rp-truck{display:flex;align-items:center;justify-content:flex-end;min-width:120px}

/* ── META: responsável / data / filial destacados ── */
.rp-meta{display:flex;gap:0;font-size:12px;font-weight:400;margin-bottom:8px;border:2px solid #333;border-radius:4px;overflow:hidden}
.rp-meta span{display:flex;align-items:center;gap:0;flex:1;padding:5px 10px;border-right:1px solid #bbb}
.rp-meta span:last-child{border-right:none}
.rp-meta strong{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#555;margin-right:5px;white-space:nowrap}
.rp-meta .rp-meta-val{font-size:13px;font-weight:700;color:#000}

/* grid principal de materiais */
.rp-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr) 148px;
  grid-template-rows:auto auto;
  gap:4px;
}

/* card de cada material */
.mat-card{border:1px solid #333;font-size:11px}
.mat-card-hdr{background:#c8c8c8;font-weight:700;text-align:center;padding:3px 4px;font-size:11px;border-bottom:1px solid #333}
.mat-inner{padding:0}
.mat-meta-row{display:flex;border-bottom:1px solid #ccc}
.mat-meta-lbl{padding:2px 4px;font-weight:700;min-width:40px;border-right:1px solid #ccc;font-size:10px}
.mat-meta-val{padding:2px 4px;font-size:10px}
.mat-table{width:100%;border-collapse:collapse;border-top:1px solid #333}
.mat-table th{background:#e8e8e8;font-weight:700;font-size:10px;padding:3px 5px;border-bottom:1px solid #555;text-align:left}
.mat-table th.r{text-align:right}
.mat-table td{padding:2px 5px;font-size:10px;border-bottom:1px solid #ddd}
.mat-table td.r{text-align:right}
.mat-table tr.mf-row td{font-weight:700;border-top:1px solid #555;background:#f0f0f0;font-size:11px}
.mat-table tr.range-row td{font-size:9px;color:#555;text-align:center;background:#fafafa}

/* card pulverulento */
.pulv-card{border:1px solid #333;font-size:10px;grid-row:1/3;grid-column:5}
.pulv-card-hdr{background:#c8c8c8;font-weight:700;text-align:center;padding:3px 4px;font-size:11px;border-bottom:1px solid #333}
.pulv-table{width:100%;border-collapse:collapse}
.pulv-table th{background:#e8e8e8;font-weight:700;font-size:10px;padding:3px 4px;border-bottom:1px solid #555}
.pulv-table th.l{text-align:left}
.pulv-table th.r{text-align:right}
.pulv-table td{padding:3px 4px;font-size:10px;border-bottom:1px solid #ddd;vertical-align:middle}
.pulv-table td.mat-name{font-weight:700;font-size:9px;line-height:1.3;border-right:1px solid #bbb;text-align:center;vertical-align:middle}
.pulv-table td.tipo{color:#333;border-right:1px solid #ddd}
.pulv-table td.val{text-align:right;font-weight:500}
.pulv-table tr.mat-sep td{border-top:1px solid #888}

/* hist */
.hist-day{background:#fff;border:1px solid #e0e0e0;border-radius:10px;margin-bottom:16px;overflow:hidden}
.hist-hdr{background:#6d6e71;color:#fff;padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
.hist-hdr-date{font-weight:500;font-size:13px}
.hist-hdr-meta{font-size:11px;opacity:.8}
.btn-del{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:inherit}

@media print{
  .no-print{display:none!important}
  html,body{background:#fff}
  .hdr,.nav,.mat-tabs,.save-bar,.report-toolbar,.hist-hdr .btn-del{display:none!important}
  .rp-page{border:none;padding:0;min-width:unset}
  .rp-wrap{padding:0;overflow:visible}
  .wrap{padding:0}
  .hist-day{page-break-inside:avoid;margin-bottom:20px;border:none}
  .hist-hdr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:10mm}
}

/* ── UMIDADE ──────────────────────────── */
.hum-result{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;background:#e1f5ee;border:1px solid #5dcaa5;color:#0a5c44;font-size:14px;font-weight:600;min-width:90px;justify-content:center}
.hum-result.empty{background:#f5f5f5;border-color:#ddd;color:#aaa;font-weight:400}
.hum-badge-ok{display:inline-flex;align-items:center;gap:5px;background:#e1f5ee;border:1px solid #5dcaa5;border-radius:5px;padding:3px 10px;font-size:12px;color:#0a5c44;font-weight:500}
.hum-badge-err{display:inline-flex;align-items:center;gap:5px;background:#fff3e0;border:1px solid #ffb74d;border-radius:5px;padding:3px 10px;font-size:12px;color:#e65100;font-weight:500}

/* ── BOTÃO IMPRIMIR NO HIST ─────────── */
.btn-print-hist{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px;font-family:inherit}
.btn-print-hist:hover{background:rgba(255,255,255,.35)}

/* ── PRINT SINGLE RECORD ─────────────── */
#print-single{display:none}

@media print{
  body.printing-single .wrap{display:none!important}
  body.printing-single #print-single{display:block!important}
}
</style>
</head>

function getHumidity(matId,leitura){
  const t=matId==='areia_media'?HUMIDITY_MEDIA:HUMIDITY_FINA;
  const n=parseInt(String(leitura).trim());
  if(isNaN(n))return null;
  return t.hasOwnProperty(n)?t[n]:null;
}

/* ── UTILS ── */
function toDay(){return new Date().toISOString().split('T')[0]}
function fmtD(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}
function pf(v){const n=parseFloat(String(v??'').replace(',','.'));return(isNaN(n)||n<0)?0:n}

function emptyMat(m){
  const masses={fundo:''};
  (m.sieves||[]).forEach(s=>{masses[s]=''});
  return{nf:'',placa:'',masses,pulvMf:''};
}
function emptyDay(){
  const o={resp:'',filial:'',umidade:[]};
  MATS.forEach(m=>{o[m.id]=emptyMat(m)});
  return o;
}

// Migra formato antigo {areia_fina:'402',areia_media:'405'} para array
function migrateUmidade(u){
  if(!u)return[];
  if(Array.isArray(u))return u.map(e=>e.numero!==undefined?e:{...e,numero:1});
  const r=[];
  if(u.areia_media)r.push({id:Date.now(),matId:'areia_media',leitura:u.areia_media,hora:'',numero:1});
  if(u.areia_fina)r.push({id:Date.now()+1,matId:'areia_fina',leitura:u.areia_fina,hora:'',numero:1});
  return r;
}

function nowHHMM(){
  const n=new Date();
  return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function calcMat(data,sieves){
  const keys=[...sieves,'fundo'];
  const vals=keys.map(k=>pf(data?.masses?.[k]));
  const tot=vals.reduce((a,b)=>a+b,0);
  let cum=0;
  const rows=keys.map((k,i)=>{
    const massa=vals[i];
    const pct=tot>0?(massa/tot)*100:0;
    cum+=pct;
    return{key:k,label:k==='fundo'?'Fundo':`${k} mm`,massa,pct,cum,pass:Math.max(0,100-cum)};
  });
  const acumMap={};
  rows.slice(0,sieves.length).forEach(r=>{acumMap[parseFloat(r.key)]=r.cum});
  const testedAsc=sieves.map(parseFloat).sort((a,b)=>a-b);
  const smallest=testedAsc[0],largest=testedAsc[testedAsc.length-1];
  let mfSum=0;
  for(const std of MF_SIEVES){
    if(std>largest)mfSum+=0;
    else if(std<=smallest)mfSum+=acumMap[smallest]||0;
    else{const next=testedAsc.find(s=>s>=std);mfSum+=next!==undefined?(acumMap[next]||0):0;}
  }
  return{rows,tot,mf:parseFloat((mfSum/100).toFixed(3))};
}

function pulvRes(mi,mfv){const a=pf(mi),b=pf(mfv);if(!a||!b)return null;return((a-b)/a)*100;}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}}
function lsDel(k){try{localStorage.removeItem(k)}catch{}}
function lsKeys(p){try{return Object.keys(localStorage).filter(k=>k.startsWith(p)).map(k=>k.slice(p.length))}catch{return[]}}

/* ── SieveTable ── */
const SieveTable=memo(function SieveTable({mc,initMasses,onUpdate}){
  const keys=useMemo(()=>[...mc.sieves,'fundo'],[mc.id]);
  const [vals,setVals]=useState(()=>{const v={};keys.forEach(k=>{v[k]=String(initMasses?.[k]??'')});return v;});
  const refs=useRef({});
  const calc=useMemo(()=>calcMat({masses:vals},mc.sieves),[vals,mc.id]);
  useEffect(()=>{onUpdate(vals)},[vals]);
  const handleChange=(k,raw)=>{const c=raw.replace(/[^0-9.,]/g,'').replace(',','.');setVals(p=>({...p,[k]:c}));};
  const handleKey=(e,idx)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const nk=keys[idx+1];
      if(nk){refs.current[nk]?.focus();refs.current[nk]?.select();}
    }
  };
  const ok=calc.tot>0&&calc.mf>=mc.mfMin&&calc.mf<=mc.mfMax;
  return(
    <div>
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th className="l">Peneira</th>
            <th className="r">Massa retida (g)</th>
            <th className="r">% Retida</th>
            <th className="r">% Ret. Acum.</th>
            <th className="r">% Passante</th>
          </tr></thead>
          <tbody>
            {calc.rows.map((row,i)=>(
              <tr key={row.key} className={i%2===0?'e':'o'}>
                <td className="l">{row.label}</td>
                <td className="r" style={{padding:'3px 4px',minWidth:100}}>
                  <input ref={el=>{refs.current[row.key]=el}} type="text" inputMode="decimal"
                    className="inp inp-r inp-sm" value={vals[row.key]}
                    onChange={e=>handleChange(row.key,e.target.value)}
                    onKeyDown={e=>handleKey(e,i)} onFocus={e=>e.target.select()}
                    placeholder="0" style={{width:'100%'}}/>
                </td>
                <td className="r">{calc.tot>0?row.pct.toFixed(2):'—'}</td>
                <td className="r">{calc.tot>0?row.cum.toFixed(2):'—'}</td>
                <td className="r">{calc.tot>0?row.pass.toFixed(2):'—'}</td>
              </tr>
            ))}
            <tr className="tot"><td className="l">Total</td><td className="r">{calc.tot>0?calc.tot.toFixed(1):'—'}</td><td colSpan={3}/></tr>
          </tbody>
        </table>
      </div>
      {calc.tot>0&&(
        <div className={ok?'mf-ok':'mf-warn'}>
          <strong>MF: {calc.mf.toFixed(3)}</strong>
          <span style={{opacity:.75}}>faixa: {mc.mfMin} – {mc.mfMax}</span>
          <span>{ok?'✓ OK':'⚠ Fora da faixa'}</span>
        </div>
      )}
    </div>
  );
});

/* ── PulvTab (aba de pulverulento na entrada) ── */
function PulvTab({dayData,setField}){
  return(
    <div className="card alt">
      <div className="sec-ttl">Pulverulento</div>
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th className="l">Material</th>
            <th className="r">MI (g)</th>
            <th className="r">MF (g)</th>
            <th className="r">Resultado (%)</th>
          </tr></thead>
          <tbody>
            {MATS.map((m,i)=>{
              const md2=dayData[m.id]||emptyMat(m);
              const res=pulvRes(m.pulvMi,md2.pulvMf);
              return(
                <tr key={m.id} className={i%2===0?'e':'o'}>
                  <td className="l" style={{fontSize:12}}>{m.label}</td>
                  <td className="r">{m.pulvMi}</td>
                  <td className="r" style={{padding:'3px 4px',minWidth:90}}>
                    <input type="text" inputMode="decimal"
                      className="inp inp-r inp-sm" value={md2.pulvMf||''}
                      onChange={e=>{const v=e.target.value.replace(/[^0-9.,]/g,'').replace(',','.');setField(`${m.id}.pulvMf`,v);}}
                      onFocus={e=>e.target.select()} placeholder="0" style={{width:'100%'}}/>
                  </td>
                  <td className="r">{res!==null?res.toFixed(2)+'%':'—'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── UmidadeView (aba de umidade) ── */
const UM_MATS=[
  {id:'areia_media',label:'Areia Natural MÉDIA',short:'A.N. Média'},
  {id:'areia_fina', label:'Areia Cava Fina',    short:'A.C. Fina'},
];

function UmidadeView({entries,onAdd,onRemove,saved,onSave,date}){
  const [matId,setMatId]=useState('areia_media');
  const [leitura,setLeitura]=useState('');
  const [hora,setHora]=useState(nowHHMM);
  const [numero,setNumero]=useState(1);
  const umidade=getHumidity(matId,leitura);
  const fora=leitura!==''&&umidade===null;

  // Agrupa entradas por número de leitura, ordenadas por hora dentro de cada grupo
  const grupos=useMemo(()=>{
    const g={};
    entries.forEach(e=>{
      const n=e.numero??1;
      if(!g[n])g[n]=[];
      g[n].push(e);
    });
    Object.keys(g).forEach(n=>{g[n].sort((a,b)=>a.hora.localeCompare(b.hora));});
    return g;
  },[entries]);
  const numeros=Object.keys(grupos).map(Number).sort((a,b)=>a-b);

  // Sugere próximo numero baseado nos já existentes
  const proximoNumero=useMemo(()=>{
    if(numeros.length===0)return 1;
    return Math.max(...numeros);
  },[numeros]);

  const handleAdd=()=>{
    if(!leitura||fora)return;
    onAdd({id:Date.now(),matId,leitura,hora,numero});
    setLeitura('');
    setHora(nowHHMM());
  };
  const handleKey=(e)=>{if(e.key==='Enter')handleAdd();};

  return(
    <div className="pad">
      {/* Formulário nova leitura */}
      <div className="card">
        <div className="sec-ttl">Nova leitura</div>
        <div style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:10,marginBottom:10,alignItems:'end'}}>
          <div>
            <div className="flbl">Nº Leitura</div>
            <select className="inp" value={numero} onChange={e=>setNumero(parseInt(e.target.value))}
              style={{cursor:'pointer',minWidth:90}}>
              {[1,2,3,4,5,6].map(n=><option key={n} value={n}>Leitura {n}</option>)}
            </select>
          </div>
          <div>
            <div className="flbl">Material</div>
            <select className="inp" value={matId} onChange={e=>setMatId(e.target.value)}
              style={{cursor:'pointer'}}>
              {UM_MATS.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
          </div>
          <div>
            <div className="flbl">Hora</div>
            <input type="time" className="inp" value={hora} onChange={e=>setHora(e.target.value)} style={{minWidth:100}}/>
          </div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
          <div style={{flex:1}}>
            <div className="flbl">Sensor</div>
            <input type="text" inputMode="numeric" className="inp inp-r"
              value={leitura}
              onChange={e=>setLeitura(e.target.value.replace(/[^0-9]/g,''))}
              onFocus={e=>e.target.select()}
              onKeyDown={handleKey}
              placeholder="000"/>
          </div>
          <div style={{flex:1}}>
            <div className="flbl">Umidade calculada</div>
            <div className="inp" style={{background:'#f5f5f5',color:umidade!==null?'#0a5c44':fora?'#e65100':'#aaa',fontWeight:umidade!==null?600:400}}>
              {leitura===''?'—':fora?'⚠ Fora do range':umidade.toFixed(1)+'%'}
            </div>
          </div>
          <button className="btn-save"
            onClick={handleAdd}
            style={{padding:'7px 18px',fontSize:13,whiteSpace:'nowrap',opacity:(!leitura||fora)?0.5:1}}>
            + Adicionar
          </button>
        </div>
      </div>

      {/* Leituras do dia — agrupadas por número */}
      {numeros.length>0&&(
        <div className="card">
          <div className="sec-ttl">Leituras do dia ({entries.length})</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-start'}}>
            {numeros.map(n=>(
              <div key={n} style={{flex:'1 1 200px',minWidth:180,border:'1px solid #e0e0e0',borderRadius:8,overflow:'hidden'}}>
                <div style={{background:'#6d6e71',color:'#fff',padding:'5px 10px',fontWeight:600,fontSize:12,letterSpacing:.5}}>
                  Leitura {n}
                </div>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr>
                      <th style={{padding:'4px 6px',fontSize:10,background:'#f5f5f5',textAlign:'left',borderBottom:'1px solid #ddd'}}>Hora</th>
                      <th style={{padding:'4px 6px',fontSize:10,background:'#f5f5f5',textAlign:'left',borderBottom:'1px solid #ddd'}}>Material</th>
                      <th style={{padding:'4px 6px',fontSize:10,background:'#f5f5f5',textAlign:'right',borderBottom:'1px solid #ddd'}}>Sensor</th>
                      <th style={{padding:'4px 6px',fontSize:10,background:'#f5f5f5',textAlign:'right',borderBottom:'1px solid #ddd'}}>Um.%</th>
                      <th style={{width:26,background:'#f5f5f5',borderBottom:'1px solid #ddd'}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {grupos[n].map((e,i)=>{
                      const mat=UM_MATS.find(m=>m.id===e.matId);
                      const u=getHumidity(e.matId,e.leitura);
                      return(
                        <tr key={e.id} style={{background:i%2===0?'#fff':'#fafafa'}}>
                          <td style={{padding:'4px 6px',fontSize:11,fontWeight:500,borderBottom:'1px solid #f0f0f0'}}>{e.hora||'—'}</td>
                          <td style={{padding:'4px 6px',fontSize:11,borderBottom:'1px solid #f0f0f0'}}>{mat?.short||e.matId}</td>
                          <td style={{padding:'4px 6px',fontSize:11,textAlign:'right',borderBottom:'1px solid #f0f0f0'}}>{e.leitura}</td>
                          <td style={{padding:'4px 6px',fontSize:11,textAlign:'right',fontWeight:600,borderBottom:'1px solid #f0f0f0',color:u!==null?'#0a5c44':'#c1272d'}}>
                            {u!==null?u.toFixed(1)+'%':'⚠'}
                          </td>
                          <td style={{textAlign:'center',padding:'2px 2px',borderBottom:'1px solid #f0f0f0'}}>
                            <button onClick={()=>onRemove(e.id)}
                              style={{background:'none',border:'none',cursor:'pointer',color:'#c1272d',fontSize:16,lineHeight:1,padding:'0 3px',fontFamily:'inherit'}}>
                              ×
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="save-bar">
        {saved&&<span className="saved">✓ Salvo — {fmtD(date)}</span>}
        <button className="btn-save" onClick={onSave}>Salvar dados do dia</button>
      </div>
    </div>
  );
}

/* ── Card de material no relatório ── */
function MatPrintCard({mc,md}){
  const c=calcMat(md||emptyMat(mc),mc.sieves);
  const ok=c.tot>0&&c.mf>=mc.mfMin&&c.mf<=mc.mfMax;
  return(
    <div className="mat-card">
      <div className="mat-card-hdr">{mc.label}</div>
      <div className="mat-meta-row">
        <span className="mat-meta-lbl">NF:</span>
        <span className="mat-meta-val">{md?.nf||''}</span>
      </div>
      <div className="mat-meta-row">
        <span className="mat-meta-lbl">PLACA:</span>
        <span className="mat-meta-val">{md?.placa||''}</span>
      </div>
      <table className="mat-table">
        <thead>
          <tr><th>PENEIRA</th><th className="r">RETIDO (g)</th></tr>
        </thead>
        <tbody>
          {c.rows.map(r=>(
            <tr key={r.key}>
              <td>{r.key==='fundo'?'FUNDO':r.key}</td>
              <td className="r">{r.massa>0?r.massa%1===0?r.massa.toFixed(0):r.massa.toFixed(1):''}</td>
            </tr>
          ))}
          <tr className="mf-row">
            <td>MF:</td>
            <td className="r" style={{color:ok?'#006600':'#cc0000'}}>{c.tot>0?c.mf.toFixed(3):''}</td>
          </tr>
          <tr className="range-row">
            <td colSpan={2}>{mc.mfMin} a {mc.mfMax}</td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

/* ── Tabela Pulverulento no relatório ── */
function PulvPrintCard({data}){
  const activePulv=MATS.filter(m=>pf((data[m.id]||{}).pulvMf)>0);
  if(activePulv.length===0)return null;
  return(
    <div className="pulv-card">
      <div className="pulv-card-hdr">PULVERULENTO</div>
      <table className="pulv-table">
        <thead>
          <tr><th className="l">MATERIAL</th><th className="l">TIPO</th><th className="r">VALOR</th></tr>
        </thead>
        <tbody>
          {activePulv.map((m,i)=>{
            const md=data[m.id]||emptyMat(m);
            const res=pulvRes(m.pulvMi,md.pulvMf);
            const sep=i>0?'mat-sep':'';
            return[
              <tr key={`${m.id}-mi`} className={sep}>
                <td className="mat-name" rowSpan={3} style={{width:52}}>{m.label.split(' ').map((w,j)=><span key={j}>{w}<br/></span>)}</td>
                <td className="tipo">MI (g):</td>
                <td className="val">{m.pulvMi}</td>
              </tr>,
              <tr key={`${m.id}-mf`}>
                <td className="tipo">MF (g):</td>
                <td className="val">{pf(md.pulvMf).toFixed(0)}</td>
              </tr>,
              <tr key={`${m.id}-res`}>
                <td className="tipo">RESULT. (%):</td>
                <td className="val">{res!==null?res.toFixed(1):''}</td>
              </tr>,
            ];
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ── DayReport (relatório completo) ── */
function DayReport({data,date}){
  // Umidade: suporta formato antigo (objeto) e novo (array)
  const umEntries=migrateUmidade(data.umidade);
  const sortedUm=[...umEntries].sort((a,b)=>a.hora.localeCompare(b.hora));
  const hasUmidade=sortedUm.length>0;

  // Apenas materiais com dados (verdes)
  const activeMats=MATS.filter(m=>calcMat(data[m.id]||emptyMat(m),m.sieves).tot>0);
  const hasPulv=MATS.some(m=>pf((data[m.id]||{}).pulvMf)>0);

  // Grid: até 4 colunas de materiais + coluna de pulverulento se houver
  const numCols=Math.min(4,Math.max(1,activeMats.length));
  const gridCols=hasPulv?`1fr 148px`:`1fr`;

  return(
    <div className="rp-wrap">
      <div className="rp-page">
        {/* Cabeçalho */}
        <div className="rp-hdr">
          <div>
            <div className="rp-logo-row">
              <div className="rp-logo-txt">SUPERMIX</div>
              <div className="rp-logo-diamond"/>
            </div>
            <div className="rp-logo-tag" style={{fontSize:7,color:'#c1272d',marginTop:1}}>facilitando a construção civil</div>
          </div>
          <div className="rp-title">GRANULOMETRIA</div>
          <div className="rp-truck"><img src={TRUCK_IMG} style={{height:80,width:'auto',display:'block'}} alt="caminhao"/></div>
        </div>

        {/* Meta */}
        <div className="rp-meta">
          <span><strong>RESPONSÁVEL</strong><span className="rp-meta-val">{data.resp||'_____________________'}</span></span>
          <span><strong>DATA</strong><span className="rp-meta-val">{fmtD(date)||'__/__/____'}</span></span>
          <span><strong>FILIAL</strong><span className="rp-meta-val">{data.filial||'____________'}</span></span>
        </div>

        {/* Grade de materiais — somente os que têm dados */}
        {activeMats.length>0?(
          <div style={{display:'grid',gridTemplateColumns:gridCols,gap:4,alignItems:'start'}}>
            {/* Materiais ativos em grid interno */}
            <div style={{display:'grid',gridTemplateColumns:`repeat(${numCols},1fr)`,gap:4}}>
              {activeMats.map(m=>(
                <MatPrintCard key={m.id} mc={m} md={data[m.id]}/>
              ))}
            </div>
            {/* Pulverulento — só aparece se tiver dados */}
            {hasPulv&&<PulvPrintCard data={data}/>}
          </div>
        ):(
          <div style={{textAlign:'center',color:'#888',padding:'12px 0',fontSize:9}}>Sem dados de granulometria lançados.</div>
        )}

        {/* Seção de Umidade — boxes por leitura */}
        {hasUmidade&&(()=>{
          // Agrupa por numero de leitura
          const grupos={};
          sortedUm.forEach(e=>{const n=e.numero??1;if(!grupos[n])grupos[n]=[];grupos[n].push(e);});
          const nums=Object.keys(grupos).map(Number).sort((a,b)=>a-b);
          return(
            <div style={{marginTop:6,borderTop:'1px solid #bbb',paddingTop:4}}>
              <div style={{fontWeight:700,fontSize:8,marginBottom:4,letterSpacing:1,color:'#444'}}>UMIDADE DA AREIA</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'flex-start'}}>
                {nums.map(n=>(
                  <div key={n} style={{flex:'1 1 0',minWidth:110,border:'1px solid #aaa',borderRadius:2,overflow:'hidden'}}>
                    <div style={{background:'#c8c8c8',fontWeight:700,fontSize:9,padding:'2px 6px',textAlign:'center',letterSpacing:.5,borderBottom:'1px solid #aaa'}}>
                      LEITURA {n}
                    </div>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:8}}>
                      <thead>
                        <tr>
                          <th style={{background:'#e8e8e8',padding:'1px 4px',border:'1px solid #ccc',textAlign:'left',fontWeight:700}}>HORA</th>
                          <th style={{background:'#e8e8e8',padding:'1px 4px',border:'1px solid #ccc',textAlign:'left',fontWeight:700}}>MATERIAL</th>
                          <th style={{background:'#e8e8e8',padding:'1px 4px',border:'1px solid #ccc',textAlign:'right',fontWeight:700}}>SENSOR</th>
                          <th style={{background:'#e8e8e8',padding:'1px 4px',border:'1px solid #ccc',textAlign:'right',fontWeight:700}}>UM.%</th>
                        </tr>
                      </thead>
                      <tbody>
                        {grupos[n].map((e,i)=>{
                          const u=getHumidity(e.matId,e.leitura);
                          const matLabel=e.matId==='areia_media'?'A.N. MÉD.':'A.C. FINA';
                          return(
                            <tr key={e.id} style={{background:i%2===0?'#fff':'#fafafa'}}>
                              <td style={{padding:'1px 4px',border:'1px solid #ddd',fontWeight:600}}>{e.hora||'—'}</td>
                              <td style={{padding:'1px 4px',border:'1px solid #ddd'}}>{matLabel}</td>
                              <td style={{padding:'1px 4px',border:'1px solid #ddd',textAlign:'right'}}>{e.leitura}</td>
                              <td style={{padding:'1px 4px',border:'1px solid #ddd',textAlign:'right',fontWeight:700,color:u!==null?'#006600':'#cc0000'}}>
                                {u!==null?u.toFixed(1)+'%':'—'}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [view,setView]=useState('entrada');
  const [date,setDate]=useState(toDay());
  const [activeMat,setActiveMat]=useState('areia_fina');
  const [dayData,setDayData]=useState(()=>emptyDay());
  const [hist,setHist]=useState([]);
  const [saved,setSaved]=useState(false);
  const [histRecords,setHistRecords]=useState([]);
  const [printTarget,setPrintTarget]=useState(null);
  const sieveKey=`${date}-${activeMat}`;

  useEffect(()=>{setHist(lsKeys('smx:').sort().reverse())},[]);
  useEffect(()=>{
    const d=lsGet(`smx:${date}`);
    if(d){
      // Migra formato antigo de umidade se necessário
      if(d.umidade&&!Array.isArray(d.umidade))d.umidade=migrateUmidade(d.umidade);
      setDayData(d);setSaved(true);
    } else {setDayData(emptyDay());setSaved(false);}
  },[date]);
  useEffect(()=>{
    if(view==='historico')
      setHistRecords(hist.map(d=>({date:d,data:lsGet(`smx:${d}`)})).filter(r=>r.data));
  },[view,hist]);

  /* Print single record effect */
  useEffect(()=>{
    if(printTarget){
      document.body.classList.add('printing-single');
      const cleanup=()=>{
        document.body.classList.remove('printing-single');
        setPrintTarget(null);
      };
      window.addEventListener('afterprint',cleanup,{once:true});
      window.print();
    }
  },[printTarget]);

  const handleSievesChange=useCallback((masses)=>{
    setDayData(p=>({...p,[activeMat]:{...p[activeMat],masses}}));setSaved(false);
  },[activeMat]);

  const setField=(path,val)=>{
    setSaved(false);
    if(path.includes('.')){
      const[mid,...rest]=path.split('.');
      setDayData(p=>({...p,[mid]:{...(p[mid]||{}),[rest.join('.')]:val}}));
    } else setDayData(p=>({...p,[path]:val}));
  };

  const save=()=>{
    if(lsSet(`smx:${date}`,dayData)){setSaved(true);setHist(p=>[...new Set([date,...p])].sort().reverse());}
    else alert('Erro ao salvar.');
  };
  const addUmidade=(entry)=>{
    setSaved(false);
    setDayData(p=>({...p,umidade:[...(Array.isArray(p.umidade)?p.umidade:[]),entry]}));
  };
  const removeUmidade=(id)=>{
    setSaved(false);
    setDayData(p=>({...p,umidade:(Array.isArray(p.umidade)?p.umidade:[]).filter(e=>e.id!==id)}));
  };
  const delH=(d)=>{
    if(!confirm(`Apagar dados de ${fmtD(d)}?`))return;
    lsDel(`smx:${d}`);setHist(p=>p.filter(x=>x!==d));setHistRecords(p=>p.filter(r=>r.date!==d));
  };

  const mc=activeMat!=='pulverulento'?MATS.find(m=>m.id===activeMat):null;
  const md=mc?(dayData[activeMat]||emptyMat(mc)):null;

  return(
    <>
    <div className="wrap">
      {/* Cabeçalho */}
      <div className="hdr no-print">
        <div className="hdr-top">
          <Logo/>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.35)',color:'#fff',borderRadius:6,padding:'5px 8px',fontSize:12,fontFamily:'inherit'}}/>
        </div>
        <div className="hdr-fields">
          <div><div className="hdr-lbl">Responsável</div><input className="hdr-inp" value={dayData.resp||''} onChange={e=>setField('resp',e.target.value)} placeholder="Nome"/></div>
          <div><div className="hdr-lbl">Filial</div><input className="hdr-inp" value={dayData.filial||''} onChange={e=>setField('filial',e.target.value)} placeholder="Filial"/></div>
        </div>
      </div>

      {/* Nav principal */}
      <div className="nav no-print">
        {[['entrada','Entrada'],['umidade','Umidade'],['historico','Histórico']].map(([id,lbl])=>(
          <button key={id} className={`nav-btn${view===id?' on':''}`} onClick={()=>setView(id)}>{lbl}</button>
        ))}
      </div>

      {/* ── ABA ENTRADA ── */}
      {view==='entrada'&&(
        <div>
          <div className="mat-tabs no-print">
            {MAT_TABS.map(m=>{
              const done=m.id==='pulverulento'
                ?MATS.some(mat=>pf((dayData[mat.id]||{}).pulvMf)>0)
                :calcMat(dayData[m.id]||emptyMat(m),m.sieves).tot>0;
              return(
                <button key={m.id} className={`mat-tab${activeMat===m.id?' on':done?' done':''}`} onClick={()=>setActiveMat(m.id)}>
                  {m.short}{done&&activeMat!==m.id?' ✓':''}
                </button>
              );
            })}
          </div>
          <div className="pad">
            {activeMat==='pulverulento'?(
              <PulvTab dayData={dayData} setField={setField}/>
            ):(
              <div className="card">
                <div style={{fontWeight:500,fontSize:14,color:'#c1272d',marginBottom:10}}>{mc.label}</div>
                <div className="fgrid">
                  <div><div className="flbl">NF</div><input className="inp" value={md.nf||''} onChange={e=>setField(`${activeMat}.nf`,e.target.value)} placeholder="Nota fiscal"/></div>
                  <div><div className="flbl">Placa</div><input className="inp" value={md.placa||''} onChange={e=>setField(`${activeMat}.placa`,e.target.value)} placeholder="ABC-1234"/></div>
                </div>
                <SieveTable key={sieveKey} mc={mc} initMasses={md.masses} onUpdate={handleSievesChange}/>
              </div>
            )}
            <div className="save-bar">
              {saved&&<span className="saved">✓ Salvo — {fmtD(date)}</span>}
              <button className="btn-save" onClick={save}>Salvar dados do dia</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ABA UMIDADE ── */}
      {view==='umidade'&&(
        <UmidadeView
          entries={Array.isArray(dayData.umidade)?dayData.umidade:migrateUmidade(dayData.umidade)}
          onAdd={addUmidade}
          onRemove={removeUmidade}
          saved={saved}
          onSave={save}
          date={date}/>
      )}

      {/* ── ABA HISTÓRICO ── */}
      {view==='historico'&&(
        <div className="pad">
          {histRecords.length===0
            ?<div style={{textAlign:'center',color:'#aaa',padding:'40px 0',fontSize:13,lineHeight:2}}>Nenhum registro salvo ainda.<br/>Preencha os dados e salve na aba Entrada.</div>
            :histRecords.map(rec=>(
              <div key={rec.date} className="hist-day">
                <div className="hist-hdr">
                  <div>
                    <div className="hist-hdr-date">{fmtD(rec.date)}{rec.date===toDay()&&<span style={{fontSize:10,marginLeft:8,opacity:.7}}>(hoje)</span>}</div>
                    {(rec.data.resp||rec.data.filial)&&<div className="hist-hdr-meta">{rec.data.resp&&`Resp: ${rec.data.resp}`}{rec.data.resp&&rec.data.filial&&' · '}{rec.data.filial&&`Filial: ${rec.data.filial}`}</div>}
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <button className="btn-print-hist" onClick={()=>setPrintTarget(rec)}>⎙ Imprimir</button>
                    <button className="btn-del" onClick={()=>delH(rec.date)}>Apagar</button>
                  </div>
                </div>
                <DayReport data={rec.data} date={rec.date}/>
              </div>
            ))
          }
        </div>
      )}

      {/* Overlay de impressão de registro único */}
    </div>
    {printTarget&&(
      <div id="print-single">
        <DayReport data={printTarget.data} date={printTarget.date}/>
      </div>
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
