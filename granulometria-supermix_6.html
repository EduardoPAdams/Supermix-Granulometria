<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Granulometria">
<meta name="theme-color" content="#c1272d">
<title>Granulometria — Supermix</title>
<style>
/* ── APP ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#f0f0f0;font-family:'Segoe UI',system-ui,sans-serif;color:#222;font-size:14px}
input[type=date]{color-scheme:light}
.wrap{max-width:960px;margin:0 auto;padding-bottom:40px}
.hdr{background:#6d6e71}
.hdr-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
.logo-box{display:flex;flex-direction:column;gap:2px}
.logo-row{display:flex;align-items:center}
.logo-txt{color:#fff;font-size:20px;font-weight:800;letter-spacing:1.5px;padding:3px 8px 3px 2px}
.logo-diamond{width:20px;height:20px;background:#c1272d;transform:rotate(45deg);flex-shrink:0}
.logo-tag{color:#c1272d;font-size:9px;letter-spacing:.3px;padding-left:2px}
.hdr-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px 16px 12px}
.hdr-lbl{color:rgba(255,255,255,.6);font-size:10px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.hdr-inp{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:6px 10px;font-size:13px;width:100%;font-family:inherit}
.hdr-inp::placeholder{color:rgba(255,255,255,.4)}
.nav{display:flex;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:20}
.nav-btn{flex:1;padding:11px 4px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;transition:.15s;font-family:inherit}
.nav-btn.on{color:#c1272d;border-bottom-color:#c1272d;font-weight:500;background:#fff9f9}
.mat-tabs{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mat-tabs::-webkit-scrollbar{display:none}
.mat-tab{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;border:1px solid #ddd;background:#fff;color:#666;font-family:inherit;flex-shrink:0}
.mat-tab.on{background:#c1272d;color:#fff;border-color:#c1272d;font-weight:500}
.mat-tab.done{border-color:#5dcaa5;color:#0a5c44}
.pad{padding:12px 16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.card.alt{background:#f7f7f7}
.sec-ttl{display:flex;align-items:center;gap:7px;font-weight:500;font-size:13px;margin-bottom:10px;color:#222}
.sec-ttl::before{content:'';display:block;width:3px;height:15px;background:#c1272d;border-radius:2px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.flbl{font-size:10px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.inp{width:100%;padding:7px 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;background:#fff;color:#222;font-family:inherit}
.inp:focus{outline:none;border-color:#c1272d;box-shadow:0 0 0 2px rgba(193,39,45,.15)}
.inp-r{text-align:right}
.inp-sm{padding:4px 6px;font-size:12px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{padding:6px 6px;font-weight:500;font-size:11px;color:#555;background:#f5f5f5;border-bottom:1px solid #e0e0e0;white-space:nowrap}
th.l{text-align:left}th.r{text-align:right}
td{padding:5px 6px;font-size:12px;border-bottom:1px solid #eee;color:#222}
td.r{text-align:right}td.l{text-align:left}
tr.e{background:#fff}tr.o{background:#fafafa}tr.tot{background:#f5f5f5;font-weight:500}
.mf-ok{display:inline-flex;align-items:center;gap:6px;background:#e1f5ee;border:1px solid #5dcaa5;border-radius:5px;padding:4px 10px;font-size:12px;color:#0a5c44;margin-top:8px}
.mf-warn{display:inline-flex;align-items:center;gap:6px;background:#fff3e0;border:1px solid #ffb74d;border-radius:5px;padding:4px 10px;font-size:12px;color:#e65100;margin-top:8px}
.save-bar{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:4px}
.saved{font-size:12px;color:#0a5c44}
.btn-save{background:#c1272d;color:#fff;border:none;border-radius:7px;padding:11px 24px;cursor:pointer;font-weight:500;font-size:14px;font-family:inherit}
.btn-save:active{transform:scale(.97)}

/* ── RELATÓRIO — Estilo folha impressa ───── */
.report-toolbar{display:flex;justify-content:flex-end;padding:12px 16px 8px}
.btn-print{background:#fff;border:1px solid #c1272d;color:#c1272d;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}

.rp-wrap{padding:0 12px 16px;overflow-x:auto}

.rp-page{
  background:#fff;
  border:1px solid #ccc;
  border-radius:6px;
  padding:14px 14px 10px;
  font-family:Arial,Helvetica,sans-serif;
  font-size:9.5px;
  color:#000;
  min-width:700px;
}

/* cabeçalho do relatório */
.rp-hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #000;padding-bottom:6px;margin-bottom:6px}
.rp-logo-row{display:flex;align-items:center;gap:4px}
.rp-logo-txt{font-size:15px;font-weight:900;letter-spacing:1px;color:#555}
.rp-logo-diamond{width:14px;height:14px;background:#c1272d;transform:rotate(45deg);flex-shrink:0;margin-left:3px}
.rp-logo-tag{font-size:7px;color:#c1272d;margin-top:1px}
.rp-title{font-size:14px;font-weight:700;letter-spacing:2px}
.rp-truck{font-size:20px}

.rp-meta{display:flex;gap:28px;font-size:10px;font-weight:400;margin-bottom:8px;border-bottom:1px solid #bbb;padding-bottom:5px}
.rp-meta span{display:flex;align-items:center;gap:4px}
.rp-meta strong{font-weight:700}

/* grid principal de materiais */
.rp-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr) 148px;
  grid-template-rows:auto auto;
  gap:4px;
}

/* card de cada material */
.mat-card{border:1px solid #333;font-size:9px}
.mat-card-hdr{background:#c8c8c8;font-weight:700;text-align:center;padding:2px 4px;font-size:9.5px;border-bottom:1px solid #333}
.mat-inner{padding:0}
.mat-meta-row{display:flex;border-bottom:1px solid #ccc}
.mat-meta-lbl{padding:1px 3px;font-weight:700;min-width:36px;border-right:1px solid #ccc;font-size:8.5px}
.mat-meta-val{padding:1px 3px;font-size:8.5px}
.mat-table{width:100%;border-collapse:collapse;border-top:1px solid #333}
.mat-table th{background:#e8e8e8;font-weight:700;font-size:8.5px;padding:2px 4px;border-bottom:1px solid #555;text-align:left}
.mat-table th.r{text-align:right}
.mat-table td{padding:1px 4px;font-size:8.5px;border-bottom:1px solid #ddd}
.mat-table td.r{text-align:right}
.mat-table tr.mf-row td{font-weight:700;border-top:1px solid #555;background:#f0f0f0;font-size:9px}
.mat-table tr.range-row td{font-size:8px;color:#555;text-align:center;background:#fafafa}

/* card pulverulento */
.pulv-card{border:1px solid #333;font-size:9px;grid-row:1/3;grid-column:5}
.pulv-card-hdr{background:#c8c8c8;font-weight:700;text-align:center;padding:2px 4px;font-size:9.5px;border-bottom:1px solid #333}
.pulv-table{width:100%;border-collapse:collapse}
.pulv-table th{background:#e8e8e8;font-weight:700;font-size:8.5px;padding:2px 3px;border-bottom:1px solid #555}
.pulv-table th.l{text-align:left}
.pulv-table th.r{text-align:right}
.pulv-table td{padding:2px 3px;font-size:8.5px;border-bottom:1px solid #ddd;vertical-align:middle}
.pulv-table td.mat-name{font-weight:700;font-size:8px;line-height:1.3;border-right:1px solid #bbb;text-align:center;vertical-align:middle}
.pulv-table td.tipo{color:#333;border-right:1px solid #ddd}
.pulv-table td.val{text-align:right;font-weight:500}
.pulv-table tr.mat-sep td{border-top:1px solid #888}

/* hist */
.hist-day{background:#fff;border:1px solid #e0e0e0;border-radius:10px;margin-bottom:16px;overflow:hidden}
.hist-hdr{background:#6d6e71;color:#fff;padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
.hist-hdr-date{font-weight:500;font-size:13px}
.hist-hdr-meta{font-size:11px;opacity:.8}
.btn-del{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:inherit}

@media print{
  .no-print{display:none!important}
  html,body{background:#fff}
  .hdr,.nav,.mat-tabs,.save-bar,.report-toolbar,.hist-hdr .btn-del{display:none!important}
  .rp-page{border:none;padding:0;min-width:unset}
  .rp-wrap{padding:0;overflow:visible}
  .wrap{padding:0}
  .hist-day{page-break-inside:avoid;margin-bottom:20px;border:none}
  .hist-hdr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:10mm}
}
</style>
</head>

    const pct=tot>0?(massa/tot)*100:0;
    cum+=pct;
    return{key:k,label:k==='fundo'?'Fundo':`${k} mm`,massa,pct,cum,pass:Math.max(0,100-cum)};
  });
  const acumMap={};
  rows.slice(0,sieves.length).forEach(r=>{acumMap[parseFloat(r.key)]=r.cum});
  const testedAsc=sieves.map(parseFloat).sort((a,b)=>a-b);
  const smallest=testedAsc[0],largest=testedAsc[testedAsc.length-1];
  let mfSum=0;
  for(const std of MF_SIEVES){
    if(std>largest) mfSum+=0;
    else if(std<=smallest) mfSum+=acumMap[smallest]||0;
    else{const next=testedAsc.find(s=>s>=std);mfSum+=next!==undefined?(acumMap[next]||0):0;}
  }
  return{rows,tot,mf:parseFloat((mfSum/100).toFixed(3))};
}

function pulvRes(mi,mfv){const a=pf(mi),b=pf(mfv);if(!a||!b)return null;return((a-b)/a)*100;}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}}
function lsDel(k){try{localStorage.removeItem(k)}catch{}}
function lsKeys(p){try{return Object.keys(localStorage).filter(k=>k.startsWith(p)).map(k=>k.slice(p.length))}catch{return[]}}

/* ── SieveTable entrada — local state, Enter navega ── */
const SieveTable=memo(function SieveTable({mc,initMasses,onUpdate,firstPulvRef}){
  const keys=useMemo(()=>[...mc.sieves,'fundo'],[mc.id]);
  const [vals,setVals]=useState(()=>{const v={};keys.forEach(k=>{v[k]=String(initMasses?.[k]??'')});return v;});
  const refs=useRef({});
  const calc=useMemo(()=>calcMat({masses:vals},mc.sieves),[vals,mc.id]);
  useEffect(()=>{onUpdate(vals)},[vals]);
  const handleChange=(k,raw)=>{const c=raw.replace(/[^0-9.,]/g,'').replace(',','.');setVals(p=>({...p,[k]:c}));};
  const handleKey=(e,idx)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const nk=keys[idx+1];
      if(nk){refs.current[nk]?.focus();refs.current[nk]?.select();}
      else{firstPulvRef?.current?.focus();firstPulvRef?.current?.select();}
    }
  };
  const ok=calc.tot>0&&calc.mf>=mc.mfMin&&calc.mf<=mc.mfMax;
  return(
    <div>
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th className="l">Peneira</th>
            <th className="r">Massa retida (g)</th>
            <th className="r">% Retida</th>
            <th className="r">% Ret. Acum.</th>
            <th className="r">% Passante</th>
          </tr></thead>
          <tbody>
            {calc.rows.map((row,i)=>(
              <tr key={row.key} className={i%2===0?'e':'o'}>
                <td className="l">{row.label}</td>
                <td className="r" style={{padding:'3px 4px',minWidth:100}}>
                  <input ref={el=>{refs.current[row.key]=el}} type="text" inputMode="decimal"
                    className="inp inp-r inp-sm" value={vals[row.key]}
                    onChange={e=>handleChange(row.key,e.target.value)}
                    onKeyDown={e=>handleKey(e,i)} onFocus={e=>e.target.select()}
                    placeholder="0" style={{width:'100%'}}/>
                </td>
                <td className="r">{calc.tot>0?row.pct.toFixed(2):'—'}</td>
                <td className="r">{calc.tot>0?row.cum.toFixed(2):'—'}</td>
                <td className="r">{calc.tot>0?row.pass.toFixed(2):'—'}</td>
              </tr>
            ))}
            <tr className="tot"><td className="l">Total</td><td className="r">{calc.tot>0?calc.tot.toFixed(1):'—'}</td><td colSpan={3}/></tr>
          </tbody>
        </table>
      </div>
      {calc.tot>0&&(
        <div className={ok?'mf-ok':'mf-warn'}>
          <strong>MF: {calc.mf.toFixed(3)}</strong>
          <span style={{opacity:.75}}>faixa: {mc.mfMin} – {mc.mfMax}</span>
          <span>{ok?'✓ OK':'⚠ Fora da faixa'}</span>
        </div>
      )}
    </div>
  );
});

/* ── Logo app ── */
function Logo(){
  return(
    <div className="logo-box">
      <div className="logo-row"><div className="logo-txt">SUPERMIX</div><div className="logo-diamond"/></div>
      <div className="logo-tag">facilitando a construção civil</div>
    </div>
  );
}

/* ── Card de material no relatório (estilo folha impressa) ── */
function MatPrintCard({mc,md}){
  const c=calcMat(md||emptyMat(mc),mc.sieves);
  const ok=c.tot>0&&c.mf>=mc.mfMin&&c.mf<=mc.mfMax;
  return(
    <div className="mat-card">
      <div className="mat-card-hdr">{mc.label}</div>
      <div className="mat-meta-row">
        <span className="mat-meta-lbl">NF:</span>
        <span className="mat-meta-val">{md?.nf||''}</span>
      </div>
      <div className="mat-meta-row">
        <span className="mat-meta-lbl">PLACA:</span>
        <span className="mat-meta-val">{md?.placa||''}</span>
      </div>
      <table className="mat-table">
        <thead>
          <tr><th>PENEIRA</th><th className="r">RETIDO (g)</th></tr>
        </thead>
        <tbody>
          {c.rows.map(r=>(
            <tr key={r.key}>
              <td>{r.key==='fundo'?'FUNDO':r.key}</td>
              <td className="r">{r.massa>0?r.massa%1===0?r.massa.toFixed(0):r.massa.toFixed(1):''}</td>
            </tr>
          ))}
          <tr className="mf-row">
            <td>MF:</td>
            <td className="r" style={{color:ok?'#006600':'#cc0000'}}>{c.tot>0?c.mf.toFixed(3):''}</td>
          </tr>
          <tr className="range-row">
            <td colSpan={2}>{mc.mfMin} a {mc.mfMax}</td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

/* ── Tabela Pulverulento no relatório ── */
function PulvPrintCard({data}){
  return(
    <div className="pulv-card">
      <div className="pulv-card-hdr">PULVERULENTO</div>
      <table className="pulv-table">
        <thead>
          <tr><th className="l">MATERIAL</th><th className="l">TIPO</th><th className="r">VALOR</th></tr>
        </thead>
        <tbody>
          {MATS.map((m,i)=>{
            const md=data[m.id]||emptyMat(m);
            const res=pulvRes(m.pulvMi,md.pulvMf);
            const sep=i>0?'mat-sep':'';
            return[
              <tr key={`${m.id}-mi`} className={sep}>
                <td className="mat-name" rowSpan={3} style={{width:52}}>{m.label.split(' ').map((w,j)=><span key={j}>{w}<br/></span>)}</td>
                <td className="tipo">MI (g):</td>
                <td className="val">{m.pulvMi}</td>
              </tr>,
              <tr key={`${m.id}-mf`}>
                <td className="tipo">MF (g):</td>
                <td className="val">{pf(md.pulvMf)>0?pf(md.pulvMf).toFixed(0):''}</td>
              </tr>,
              <tr key={`${m.id}-res`}>
                <td className="tipo">RESULT. (%):</td>
                <td className="val">{res!==null?res.toFixed(1):''}</td>
              </tr>,
            ];
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ── Relatório completo (estilo folha impressa) ── */
function DayReport({data,date,showPrint}){
  return(
    <div>
      {showPrint&&(
        <div className="report-toolbar no-print">
          <button className="btn-print" onClick={()=>window.print()}>⎙ Imprimir / PDF</button>
        </div>
      )}
      <div className="rp-wrap">
        <div className="rp-page">
          {/* Cabeçalho */}
          <div className="rp-hdr">
            <div>
              <div className="rp-logo-row">
                <div className="rp-logo-txt">SUPERMIX</div>
                <div className="rp-logo-diamond"/>
              </div>
              <div className="rp-logo-tag" style={{fontSize:7,color:'#c1272d',marginTop:1}}>facilitando a construção civil</div>
            </div>
            <div className="rp-title">GRANULOMETRIA</div>
            <div className="rp-truck"><img src={TRUCK_IMG} style={{height:42,width:'auto',display:'block'}} alt="caminhao"/></div>
          </div>

          {/* Meta */}
          <div className="rp-meta">
            <span><strong>RESPONSÁVEL:</strong> {data.resp||'_____________________'}</span>
            <span><strong>DATA:</strong> {fmtD(date)||'__/__/____'}</span>
            <span><strong>FILIAL:</strong> {data.filial||'____________'}</span>
          </div>

          {/* Grade de materiais */}
          <div className="rp-grid">
            {/* Linha 1 */}
            {ROW1.map(id=>{
              const mc=MATS.find(m=>m.id===id);
              return <MatPrintCard key={id} mc={mc} md={data[id]}/>;
            })}
            {/* Pulverulento — span 2 linhas */}
            <PulvPrintCard data={data}/>
            {/* Linha 2 */}
            {ROW2.map(id=>{
              const mc=MATS.find(m=>m.id===id);
              return <MatPrintCard key={id} mc={mc} md={data[id]}/>;
            })}
            {/* Célula vazia (col 4, linha 2) */}
            <div/>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [view,setView]=useState('entrada');
  const [date,setDate]=useState(toDay());
  const [activeMat,setActiveMat]=useState('areia_fina');
  const [dayData,setDayData]=useState(()=>emptyDay());
  const [hist,setHist]=useState([]);
  const [saved,setSaved]=useState(false);
  const [histRecords,setHistRecords]=useState([]);
  const sieveKey=`${date}-${activeMat}`;
  const firstPulvRef=useRef(null);

  useEffect(()=>{setHist(lsKeys('smx:').sort().reverse())},[]);
  useEffect(()=>{
    const d=lsGet(`smx:${date}`);setDayData(d||emptyDay());setSaved(!!d);
  },[date]);
  useEffect(()=>{
    if(view==='historico')
      setHistRecords(hist.map(d=>({date:d,data:lsGet(`smx:${d}`)})).filter(r=>r.data));
  },[view,hist]);

  const handleSievesChange=useCallback((masses)=>{
    setDayData(p=>({...p,[activeMat]:{...p[activeMat],masses}}));setSaved(false);
  },[activeMat]);

  const setField=(path,val)=>{
    setSaved(false);
    if(path.includes('.')){const[mid,...rest]=path.split('.');setDayData(p=>({...p,[mid]:{...p[mid],[rest.join('.')]:val}}));}
    else setDayData(p=>({...p,[path]:val}));
  };

  const save=()=>{
    if(lsSet(`smx:${date}`,dayData)){setSaved(true);setHist(p=>[...new Set([date,...p])].sort().reverse());}
    else alert('Erro ao salvar.');
  };
  const delH=(d)=>{
    if(!confirm(`Apagar dados de ${fmtD(d)}?`))return;
    lsDel(`smx:${d}`);setHist(p=>p.filter(x=>x!==d));setHistRecords(p=>p.filter(r=>r.date!==d));
  };

  const mc=MATS.find(m=>m.id===activeMat);
  const md=dayData[activeMat]||emptyMat(mc);

  return(
    <div className="wrap">
      <div className="hdr no-print">
        <div className="hdr-top">
          <Logo/>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.35)',color:'#fff',borderRadius:6,padding:'5px 8px',fontSize:12,fontFamily:'inherit'}}/>
        </div>
        <div className="hdr-fields">
          <div><div className="hdr-lbl">Responsável</div><input className="hdr-inp" value={dayData.resp||''} onChange={e=>setField('resp',e.target.value)} placeholder="Nome"/></div>
          <div><div className="hdr-lbl">Filial</div><input className="hdr-inp" value={dayData.filial||''} onChange={e=>setField('filial',e.target.value)} placeholder="Filial"/></div>
        </div>
      </div>

      <div className="nav no-print">
        {[['entrada','Entrada'],['relatorio','Relatório'],['historico','Histórico']].map(([id,lbl])=>(
          <button key={id} className={`nav-btn${view===id?' on':''}`} onClick={()=>setView(id)}>{lbl}</button>
        ))}
      </div>

      {view==='entrada'&&(
        <div>
          <div className="mat-tabs no-print">
            {MATS.map(m=>{
              const done=calcMat(dayData[m.id]||emptyMat(m),m.sieves).tot>0;
              return(
                <button key={m.id} className={`mat-tab${activeMat===m.id?' on':done?' done':''}`} onClick={()=>setActiveMat(m.id)}>
                  {m.short}{done&&activeMat!==m.id?' ✓':''}
                </button>
              );
            })}
          </div>
          <div className="pad">
            <div className="card">
              <div style={{fontWeight:500,fontSize:14,color:'#c1272d',marginBottom:10}}>{mc.label}</div>
              <div className="fgrid">
                <div><div className="flbl">NF</div><input className="inp" value={md.nf||''} onChange={e=>setField(`${activeMat}.nf`,e.target.value)} placeholder="Nota fiscal"/></div>
                <div><div className="flbl">Placa</div><input className="inp" value={md.placa||''} onChange={e=>setField(`${activeMat}.placa`,e.target.value)} placeholder="ABC-1234"/></div>
              </div>
              <SieveTable key={sieveKey} mc={mc} initMasses={md.masses} onUpdate={handleSievesChange} firstPulvRef={firstPulvRef}/>
            </div>

            <div className="card alt">
              <div className="sec-ttl">Pulverulento</div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th className="l">Material</th><th className="r">MI (g)</th><th className="r">MF (g)</th><th className="r">Resultado (%)</th></tr></thead>
                  <tbody>
                    {MATS.map((m,i)=>{
                      const md2=dayData[m.id]||emptyMat(m);
                      const res=pulvRes(m.pulvMi,md2.pulvMf);
                      return(
                        <tr key={m.id} className={i%2===0?'e':'o'}>
                          <td className="l" style={{fontSize:12}}>{m.label}</td>
                          <td className="r">{m.pulvMi}</td>
                          <td className="r" style={{padding:'3px 4px',minWidth:90}}>
                            <input ref={i===0?firstPulvRef:null} type="text" inputMode="decimal"
                              className="inp inp-r inp-sm" value={md2.pulvMf||''}
                              onChange={e=>{const v=e.target.value.replace(/[^0-9.,]/g,'').replace(',','.');setField(`${m.id}.pulvMf`,v);}}
                              onFocus={e=>e.target.select()} placeholder="0" style={{width:'100%'}}/>
                          </td>
                          <td className="r">{res!==null?res.toFixed(2)+'%':'—'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="save-bar">
              {saved&&<span className="saved">✓ Salvo — {fmtD(date)}</span>}
              <button className="btn-save" onClick={save}>Salvar dados do dia</button>
            </div>
          </div>
        </div>
      )}

      {view==='relatorio'&&<DayReport data={dayData} date={date} showPrint={true}/>}

      {view==='historico'&&(
        <div className="pad">
          {histRecords.length===0
            ?<div style={{textAlign:'center',color:'#aaa',padding:'40px 0',fontSize:13,lineHeight:2}}>Nenhum registro salvo ainda.<br/>Preencha os dados e salve na aba Entrada.</div>
            :histRecords.map(rec=>(
              <div key={rec.date} className="hist-day">
                <div className="hist-hdr">
                  <div>
                    <div className="hist-hdr-date">{fmtD(rec.date)}{rec.date===toDay()&&<span style={{fontSize:10,marginLeft:8,opacity:.7}}>(hoje)</span>}</div>
                    {(rec.data.resp||rec.data.filial)&&<div className="hist-hdr-meta">{rec.data.resp&&`Resp: ${rec.data.resp}`}{rec.data.resp&&rec.data.filial&&' · '}{rec.data.filial&&`Filial: ${rec.data.filial}`}</div>}
                  </div>
                  <button className="btn-del" onClick={()=>delH(rec.date)}>Apagar</button>
                </div>
                <DayReport data={rec.data} date={rec.date} showPrint={false}/>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
